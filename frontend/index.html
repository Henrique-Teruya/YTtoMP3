<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="YTMP3 — Professional YouTube to audio converter. Download high-quality MP3, WAV, FLAC, and M4A from any YouTube video.">
  <meta name="theme-color" content="#0a0a0b">

  <!-- Open Graph -->
  <meta property="og:title" content="YTMP3 — YouTube Audio Converter">
  <meta property="og:description" content="Convert YouTube videos to high-quality MP3, WAV, FLAC, and M4A audio files.">
  <meta property="og:type" content="website">

  <title>YTMP3 — YouTube Audio Converter</title>

  <!-- Fonts: Satoshi + General Sans from Fontshare -->
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>
<body>

  <!-- Background Video -->
  <div class="video-bg-container">
    <video id="bg-video" autoplay muted loop playsinline>
      <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_115655_b4d9cd77-feed-43cd-a198-af78ebdf1f7a.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Grain Overlay -->
  <div class="grain" aria-hidden="true"></div>

  <!-- Ambient Glow -->
  <div class="ambient-glow" aria-hidden="true"></div>

  <div class="app">
    <!-- Header -->
    <header class="header" id="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="7" fill="url(#logo-grad)"/>
            <path d="M8 9.5L8 18.5M12 7L12 21M16 10L16 18M20 8L20 20" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
            <defs>
              <linearGradient id="logo-grad" x1="0" y1="0" x2="28" y2="28">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#818cf8"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-name">YTMP3</span>
        </div>
      </div>
      <p class="tagline">YouTube → High-Quality Audio</p>
    </header>

    <!-- Main Converter -->
    <main class="main">
      <section class="converter-card" id="converter-card">
        <!-- URL Input -->
        <div class="input-group" id="input-group">
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            <input
              type="url"
              id="url-input"
              class="url-input"
              placeholder="Paste YouTube URL here..."
              autocomplete="off"
              spellcheck="false"
              aria-label="YouTube video URL"
            >
            <button class="btn-clear" id="btn-clear" type="button" aria-label="Clear input" style="display:none;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <div class="input-hint" id="input-hint"></div>
        </div>

        <!-- Format Selector -->
        <div class="format-group" id="format-group">
          <label class="format-label">Output Format</label>
          <div class="format-options" role="radiogroup" aria-label="Audio format">
            <button class="format-btn active" data-format="mp3" role="radio" aria-checked="true" id="format-mp3">
              <span class="format-name">MP3</span>
              <span class="format-desc">Universal</span>
            </button>
            <button class="format-btn" data-format="wav" role="radio" aria-checked="false" id="format-wav">
              <span class="format-name">WAV</span>
              <span class="format-desc">Lossless</span>
            </button>
            <button class="format-btn" data-format="flac" role="radio" aria-checked="false" id="format-flac">
              <span class="format-name">FLAC</span>
              <span class="format-desc">Hi-Fi</span>
            </button>
            <button class="format-btn" data-format="m4a" role="radio" aria-checked="false" id="format-m4a">
              <span class="format-name">M4A</span>
              <span class="format-desc">Apple</span>
            </button>
          </div>
        </div>

        <!-- Convert Button -->
        <button class="btn-convert" id="btn-convert" disabled>
          <span class="btn-convert-text">Converter Agora</span>
          <span class="btn-convert-loader" style="display:none;">
            <span class="spinner"></span>
            <span>Iniciando...</span>
          </span>
        </button>
      </section>

      <!-- Video Preview (hidden initially) -->
      <section class="preview-card hidden" id="preview-card">
        <div class="preview-thumbnail-wrap">
          <img class="preview-thumbnail" id="preview-thumbnail" src="" alt="Video thumbnail">
          <span class="preview-duration" id="preview-duration"></span>
        </div>
        <div class="preview-info">
          <h2 class="preview-title" id="preview-title"></h2>
          <p class="preview-channel" id="preview-channel"></p>
        </div>
      </section>

      <!-- Progress Section (hidden initially) -->
      <section class="progress-card hidden" id="progress-card">
        <div class="progress-header">
          <div class="status-badge" id="status-badge">
            <span class="status-dot"></span>
            <span class="status-text" id="status-text">Aguardando</span>
          </div>
          <div class="progress-ticker" id="progress-ticker">
            <div class="ticker-column" data-index="0">
              <div class="ticker-digit">0</div><div class="ticker-digit">1</div><div class="ticker-digit">2</div><div class="ticker-digit">3</div><div class="ticker-digit">4</div>
              <div class="ticker-digit">5</div><div class="ticker-digit">6</div><div class="ticker-digit">7</div><div class="ticker-digit">8</div><div class="ticker-digit">9</div>
            </div>
            <div class="ticker-column" data-index="1">
              <div class="ticker-digit">0</div><div class="ticker-digit">1</div><div class="ticker-digit">2</div><div class="ticker-digit">3</div><div class="ticker-digit">4</div>
              <div class="ticker-digit">5</div><div class="ticker-digit">6</div><div class="ticker-digit">7</div><div class="ticker-digit">8</div><div class="ticker-digit">9</div>
            </div>
            <div class="ticker-column" data-index="2">
              <div class="ticker-digit">0</div><div class="ticker-digit">1</div><div class="ticker-digit">2</div><div class="ticker-digit">3</div><div class="ticker-digit">4</div>
              <div class="ticker-digit">5</div><div class="ticker-digit">6</div><div class="ticker-digit">7</div><div class="ticker-digit">8</div><div class="ticker-digit">9</div>
            </div>
            <span class="ticker-symbol">%</span>
          </div>
        </div>

        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-bar-fill"></div>
          <div class="progress-bar-shimmer"></div>
        </div>

        <div class="progress-details" id="progress-details">
          <span class="progress-speed" id="progress-speed"></span>
          <span class="progress-eta" id="progress-eta"></span>
        </div>

        <!-- Waveform Animation -->
        <div class="waveform" id="waveform">
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
        </div>
      </section>

      <!-- Download Section (hidden initially) -->
      <section class="download-card hidden" id="download-card">
        <div class="download-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="8 12 12 16 16 12"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
          </svg>
        </div>
        <h2 class="download-title" id="download-title">Pronto!</h2>
        <p class="download-filename" id="download-filename"></p>
        <button class="btn-download" id="btn-download">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>Download</span>
        </button>
        <button class="btn-new" id="btn-new">Converter Outro</button>
      </section>

      <!-- Error Section (hidden initially) -->
      <section class="error-card hidden" id="error-card">
        <div class="error-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
        </div>
        <h2 class="error-title">Erro na Conversão</h2>
        <p class="error-message" id="error-message"></p>
        <button class="btn-retry" id="btn-retry">Tentar Novamente</button>
      </section>

      <!-- History (hidden if empty) -->
      <section class="history-section hidden" id="history-section">
        <h3 class="history-title">Conversões Recentes</h3>
        <div class="history-list" id="history-list"></div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2026 <strong>Henrique Teruya</strong>. Todos os direitos reservados.</p>
      <p class="footer-sub">Powered by <strong>yt-dlp</strong> + <strong>FFmpeg</strong></p>
    </footer>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="script.js"></script>
</body>
</html>
