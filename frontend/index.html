<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Audio Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>YouTube Audio Converter</h1>
            <p>Convert and download YouTube videos to high-quality audio</p>
        </header>

        <main>
            <div class="converter-box">
                <input type="text" id="url-input" placeholder="Paste YouTube URL here..." aria-label="YouTube URL">

                <div class="options">
                    <select id="format-select" aria-label="Select format">
                        <option value="mp3">MP3</option>
                        <option value="wav">WAV</option>
                        <option value="flac">FLAC</option>
                    </select>
                    <button id="download-btn">Download</button>
                </div>
            </div>

            <div id="status-container" class="status-container hidden">
                <div id="loader" class="loader"></div>
                <p id="status-message"></p>
            </div>
        </main>

        <footer>
            <p>Fast, free, and secure.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
